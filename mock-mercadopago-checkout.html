<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Mock Mercado Pago · Your CHRIS App</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(255, 195, 133, 0.38), transparent 32%),
        linear-gradient(180deg, #faf5ef 0%, #f3eadf 100%);
      color: #241711;
    }
    .card {
      width: min(92vw, 560px);
      padding: 28px;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(74, 48, 23, 0.08);
      box-shadow: 0 28px 70px rgba(56, 35, 19, 0.12);
      display: grid;
      gap: 18px;
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 2.6rem);
    }
    p {
      margin: 0;
      line-height: 1.55;
      color: #6f6358;
    }
    .meta {
      display: grid;
      gap: 10px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(248, 243, 237, 0.92);
    }
    .meta strong {
      color: #241711;
    }
    .actions {
      display: grid;
      gap: 12px;
    }
    button {
      min-height: 54px;
      border: 0;
      border-radius: 18px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    .approve { background: #ef7f25; color: white; }
    .pending { background: #f9d7b2; color: #8b4e1f; }
    .reject { background: #ead8d6; color: #8c3c35; }
  </style>
</head>
<body>
  <main class="card">
    <div>
      <h1>Checkout local de prueba</h1>
      <p>Este flujo simula Mercado Pago en entorno local. La premium solo se activa si eliges un pago aprobado.</p>
    </div>
    <div class="meta">
      <div>Cuenta comercial visible: <strong>722969010773010312</strong></div>
      <div>Correo de soporte: <strong>chris@yourchisapp.com</strong></div>
      <div id="intentMeta">Cargando intento...</div>
    </div>
    <div class="actions">
      <button class="approve" data-status="approved">Simular pago aprobado</button>
      <button class="pending" data-status="pending">Simular pago pendiente</button>
      <button class="reject" data-status="rejected">Simular pago rechazado</button>
    </div>
  </main>
  <script>
    const url = new URL(window.location.href);
    const intentId = url.searchParams.get("intent");
    const installationId = url.searchParams.get("installationId");
    document.getElementById("intentMeta").textContent = intentId
      ? `Intento: ${intentId}`
      : "Intento no encontrado";

    async function complete(status) {
      await fetch("./api/payments/mock-complete", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          intentId,
          installationId,
          status
        })
      });

      window.location.href = `./App_Recibo_Themes.html?intent_id=${encodeURIComponent(intentId)}&payment_status=${encodeURIComponent(status)}`;
    }

    document.querySelectorAll("[data-status]").forEach((button) => {
      button.addEventListener("click", () => complete(button.dataset.status));
    });
  </script>
</body>
</html>
